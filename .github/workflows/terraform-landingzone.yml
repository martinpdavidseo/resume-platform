name: Terraform Landing Zone

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main
    paths:
      - "terraform/landingzone/**"

permissions:
  id-token: write
  contents: read

jobs:
  stage_1:
    name: Terraform validation and plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/landingzone

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config=../backend/dev-landingzone.hcl

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file=../configs/dev-landingzone.tfvars

  stage_2:
    name: Terraform Apply
    needs: stage_1
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment: dev
    defaults:
      run:
        working-directory: terraform/landingzone

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config=../backend/dev-landingzone.hcl

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=../configs/dev-landingzone.tfvars